services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: rag-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "ollama:11434"
      OLLAMA_INSTRUCT_MODEL: "${OLLAMA_INSTRUCT_MODEL:-llama3.2:3b}"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-bge-m3}"
    entrypoint: ["sh", "-c"]
    command:
      - "ollama pull \"$$OLLAMA_INSTRUCT_MODEL\" && ollama pull \"$$OLLAMA_EMBED_MODEL\""
    restart: "no"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rag-open-webui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      ollama:
        condition: service_healthy

  ingest:
    build:
      context: ./ingest
    container_name: rag-ingest
    profiles: ["ingest"]
    environment:
      CONTENT_DIR: "/content"
      STATE_DIR: "/state"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-content}"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-bge-m3}"
      FORCE_INGEST: "${FORCE_INGEST:-false}"
      CHUNK_MAX_CHARS: "${CHUNK_MAX_CHARS:-1800}"
      CHUNK_MIN_CHARS: "${CHUNK_MIN_CHARS:-30}"
      UPSERT_BATCH_SIZE: "${UPSERT_BATCH_SIZE:-64}"
    volumes:
      - ./content:/content:ro
      - ingest_state:/state
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: "no"

  mcp-server:
    build:
      context: ./mcp_server
    container_name: rag-mcp-server
    restart: unless-stopped
    # Matches the Dockerfile CMD -- kept explicit here so it's an obvious,
    # easy override point (e.g. append `--reload` for dev without editing
    # the image), via `docker compose run --rm --service-ports mcp-server
    # uvicorn server:app --host 0.0.0.0 --port 8000 --reload` or a
    # docker-compose.override.yml.
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"
    environment:
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-content}"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-bge-m3}"
      OLLAMA_INSTRUCT_MODEL: "${OLLAMA_INSTRUCT_MODEL:-llama3.2:3b}"
      RERANKER_MODEL: "${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"
      TOP_K_RETRIEVE: "${TOP_K_RETRIEVE:-20}"
      TOP_K_RERANK: "${TOP_K_RERANK:-5}"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    volumes:
      - ./mcp_server:/app
      - reranker_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  qdrant_data:
  ollama_data:
  openwebui_data:
  ingest_state:
  reranker_cache:
