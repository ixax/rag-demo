global:
  scrape_interval: 15s

scrape_configs:
  # App-level metrics (tokens/sec, active_requests, per-step latency
  # histograms) once mcp-server/reranker/ingest are instrumented to push
  # OTLP metrics to otel-collector.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Per-container CPU/mem/network.
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Host-level CPU/mem/network/disk.
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
