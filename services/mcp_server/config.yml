# mcp-server runtime configuration -- RAG-pipeline tuning knobs.
#
# Deployment/infra settings (Qdrant/Ollama URLs, ports, embedding model,
# Anthropic credentials) stay as environment variables in docker-compose.yml
# / .env -- this file is only for things you'd want to tune without touching
# infra. Since ./services/mcp_server is bind-mounted into the container,
# editing this file and restarting the service (`make restart`, or just the
# mcp-server service) is enough -- no rebuild needed.

# Reranking between Qdrant retrieval and generation, via the standalone
# reranker gRPC service (see /services/reranker) -- its model/max_length
# live in services/reranker/config.yml, not here.
reranker:
  # true | false. When false, retrieval falls back to plain Qdrant
  # cosine-similarity order: the reranker service is never called, no
  # "rerank" step runs, and each result's rerank_score is null. Faster
  # (skips a network round-trip + CPU-heavy cross-encoder inference) but
  # less precise -- vector similarity alone can rank a semantically-
  # adjacent-but-wrong chunk above the actual answer (see AGENTS.md's
  # search-quality notes). Good for quick local iteration, or when the
  # reranker service isn't running.
  enabled: true
  # null | float in (0, 1]. Confidence-gated cutoff applied after reranking,
  # before top_k_rerank slicing: if the top-scoring chunk's rerank_score is
  # >= this value, every chunk scoring below it is dropped (a confidently
  # relevant match exists, so weaker ones are noise, not just "less good").
  # If the top score itself doesn't clear the cutoff, nothing is dropped --
  # a mediocre top match still beats returning no context at all. null
  # disables this (all top_k_rerank chunks are kept regardless of score).
  # Ignored when enabled is false (no rerank_score to gate on).
  confidence_cutoff: 0.9

# How many chunks to pull and keep at each retrieval stage.
retrieval:
  # Integer > 0. Candidates pulled from Qdrant by cosine similarity, before
  # reranking. Larger = better recall for the reranker to work with, but
  # slower (reranker inference time scales linearly with this). Irrelevant
  # when reranker.enabled is false -- top_k_rerank is applied directly to
  # the Qdrant-ordered hits instead, so there's no separate candidate pool.
  top_k_retrieve: 10
  # Integer > 0. How many reranked (or, with the reranker off, raw
  # vector-retrieved) chunks are kept as final context for generation, or
  # returned by search_documents. This is the default; callers can still
  # override it per-call via the tool's `top_k` argument.
  top_k_rerank: 5

# Generation backend for answer_question. search_documents never generates
# (retrieval-only), so this doesn't affect it.
backend:
  # "" | "ollama" | "anthropic".
  #   "" (empty):  skip generation entirely. answer_question then behaves
  #                like search_documents -- returns context/trace only,
  #                with answer/reasoning/sources left null/empty and no
  #                "generate" step in trace. Use this to test retrieval
  #                without paying generation latency/cost.
  #   ollama:      local MODEL_INSTRUCT_INTERNAL (env var) via Ollama's
  #                /api/chat. max_tokens below is ignored.
  #   anthropic:   the Claude API via the official SDK -- uses
  #                MODEL_INSTRUCT_EXTERNAL (env var) and max_tokens below,
  #                and requires ANTHROPIC_API_KEY to be set in the
  #                environment (neither credential lives in this file).
  type: "ollama"
  # Placeholder -- overwritten at startup from MODEL_INSTRUCT_INTERNAL or
  # MODEL_INSTRUCT_EXTERNAL, whichever type above selects (see server.py).
  # Whatever is written here is ignored.
  model: "$MODEL_INSTRUCT_INTERNAL or $MODEL_INSTRUCT_EXTERNAL"
  # Max output tokens for the Claude API call. Required (no default) when
  # type: "anthropic"; ignored otherwise. Integer > 0.
  max_tokens: 1024

# System prompt sent to the generation backend (shared by both ollama and
# anthropic). Must keep the model replying in three labeled sections, in
# this order, each starting on its own line -- "Reasoning:", "Answer:",
# "Sources:" -- because answer_question's parse_structured_answer()
# (libs/config.py) parses exactly that shape. If the model doesn't follow
# it (small local models sometimes don't), the parser falls back to
# reasoning=null, answer=<raw text>, sources=[] rather than erroring.
system_prompt: |
  You are a documentation assistant. Answer using ONLY the sources below --
  never guess or use outside knowledge. Reply in the question's language.

  Combine sources that together answer different parts of the SAME
  question (e.g. an "install" step and a "launch" step). Don't pull in a
  source just because it shares a page or topic if it doesn't actually
  help answer what was asked.

  Reply in exactly three labeled sections, each starting on its own line
  with the label followed by a colon (not a markdown heading):

  Reasoning: 1-2 sentences on which sources are relevant and why.

  Answer: plain prose or steps, no [n] markers. Only facts literally in the
  sources.

  Sources: one per line, '[id] title (path)', only those used in Answer.

  Example -- sources answer the question:
  Reasoning: Source 1 gives the file path.
  Answer: Launch it from `\win64\unifiededitor.exe`.
  Sources: [1] Installation (ue/install/index.md)

  Example -- sources don't answer the question:
  Reasoning: None of the sources cover this.
  Answer: Not enough data in the sources to answer this.
  Sources:

  Before you answer, check: can you cite a source id for every fact? If
  not, cut it -- it's a guess, not grounding. Grounding beats completeness:
  a short, fully-cited answer beats a longer one with unsupported claims.

# Per-chunk template used to render each retrieved chunk into the context
# block sent to the generation backend (answer_question only --
# search_documents never generates). Python str.format() placeholders:
# {id} (1-based position among the retrieved chunks), {title}, {path}
# (source_path), {updated} (payload's lastmod, or "unknown" if it has
# none), {text} (the chunk body). Values are substituted verbatim -- a
# chunk's own text may contain literal "{"/"}" (e.g. heading anchors like
# "{#launch-ue}") without breaking the template, since str.format() doesn't
# re-scan substituted values for further placeholders. Only the template
# string itself must stick to the five placeholders above.
source_template: |
  <source id="{id}" title="{title}" path="{path}" updated="{updated}">
  {text}
  </source>

# Whole-prompt template assembled from source_template's joined output
# ({context}) and the raw user query ({query}) -- this, not server.py, owns
# the entire literal wording of the user turn, including the "Question:"
# label and the closing instruction. The closing instruction repeats the
# key formatting/grounding requirement right next to the question (not just
# in system_prompt) as insurance against the model losing it over a long
# context of sources.
user_prompt_template: |
  {context}

  Question: {query}

  Answer using only the sources above, in Reasoning/Answer/Sources format.
  Combine sources that cover different parts of this question, but don't
  pull in one that doesn't actually help. If the data isn't sufficient,
  say so in Answer -- don't invent one.

# Request timeout (seconds) for calls to Ollama's /api/embeddings (query
# embedding). Number > 0. Does not apply to generation.
ollama_timeout: 120

# Request timeout (seconds) for calls to Ollama's /api/chat (generation).
# Number > 0. Separate from ollama_timeout above, which is embeddings-only.
generate_timeout: 300
