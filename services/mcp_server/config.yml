# mcp-server runtime configuration
#
# Deployment/infra settings (Qdrant/Ollama URLs, ports, embedding model) stay
# as environment variables in docker-compose.yml / .env -- this file is only
# for things you'd want to tune without touching infra. Since
# ./services/mcp_server is bind-mounted into the container, editing this file
# and restarting the service (`make restart`, or just the mcp-server
# service) is enough -- no rebuild needed.

# Everything behind search_documents/answer_question -- retrieval, reranking,
# and RAG-answer generation.
search_tools:
  # Reranking between Qdrant retrieval and generation, via an external
  # reranker HTTP service this repo doesn't own -- its model/max_length are
  # that deployment's own config, not this file's concern.
  reranker:
    # true | false. When false, retrieval falls back to plain Qdrant
    # cosine-similarity order: the reranker service is never called, no
    # "rerank" step runs, and each result's rerank_score is null. Faster
    # (skips a network round-trip + CPU-heavy cross-encoder inference) but
    # less precise -- vector similarity alone can rank a semantically-
    # adjacent-but-wrong chunk above the actual answer (see AGENTS.md's
    # search-quality notes). Good for quick local iteration, or when the
    # reranker service isn't running.
    enabled: true
    # null | float in (0, 1]. Confidence-gated cutoff applied after reranking,
    # before top_k_rerank slicing: if the top-scoring chunk's rerank_score is
    # >= this value, every chunk scoring below it is dropped (a confidently
    # relevant match exists, so weaker ones are noise, not just "less good").
    # If the top score itself doesn't clear the cutoff, nothing is dropped --
    # a mediocre top match still beats returning no context at all. null
    # disables this (all top_k_rerank chunks are kept regardless of score).
    # Ignored when enabled is false (no rerank_score to gate on).
    confidence_cutoff: 0.9

  # How many chunks to pull and keep at each retrieval stage.
  retrieval:
    # Integer > 0. Candidates pulled from Qdrant by cosine similarity, before
    # reranking. Larger = better recall for the reranker to work with, but
    # slower (reranker inference time scales linearly with this). Irrelevant
    # when reranker.enabled is false -- top_k_rerank is applied directly to
    # the Qdrant-ordered hits instead, so there's no separate candidate pool.
    top_k_retrieve: 20
    # Integer > 0. How many reranked (or, with the reranker off, raw
    # vector-retrieved) chunks are kept as final context for generation, or
    # returned by search_documents. This is the default; callers can still
    # override it per-call via the tool's `top_k` argument.
    top_k_rerank: 5

  # Reasoning/generation backend for answer_question -- always the local
  # OLLAMA_REASONING_MODEL via Ollama's /api/chat, reached at
  # OLLAMA_HOST/OLLAMA_PORT like the embedding model. search_documents never
  # generates (retrieval-only), so this doesn't affect it. Always runs for
  # answer_question -- there is no toggle to skip it.
  reasoning:
    # Placeholder -- overwritten at startup from OLLAMA_REASONING_MODEL (see
    # server.py). Whatever is written here is ignored.
    model: "$OLLAMA_REASONING_MODEL"

  # Generation prompt/params for the local Ollama model (open-weight models
  # run locally -- e.g. gemma3:4b, llama3.2:3b, qwen3). Short, literal
  # instructions plus JSON-schema-constrained output (response_schema below,
  # sent as Ollama's `format` field) instead of a textual "reply in this
  # shape" instruction -- small local models don't reliably follow textual
  # format instructions, but schema-constrained sampling enforces the shape
  # regardless of the model's chat template (e.g. Gemma has no native system
  # role; a template mismatch degrades quality silently rather than
  # erroring, so the contract shouldn't depend on how the template handles
  # system messages).
  generation:
    # The three-key shape below is enforced by response_schema, not by this
    # text; this text only needs to carry semantic intent (what each field
    # means), not the JSON mechanics. sources asks for bare ids, not a
    # formatted citation string -- golden-eval showed gemma3:4b can pick
    # correct ids reliably but can't reliably compose "[id] title (path)"
    # itself (produced malformed output composing that string). server.py
    # formats the citation from `chunks` using the ids this returns, instead
    # of asking the model to produce that string. reasoning is required (was
    # optional before -- golden-eval showed the model skips it entirely once
    # it's optional, even though the old free-text prompt without a schema
    # always filled it in reliably).
    system_prompt: |
      Answer using ONLY the sources. Never guess or use outside knowledge.
      Reply in the question's language.

      Output JSON with exactly these keys:
      reasoning: 1-2 sentences on which sources you used and why.
      answer: plain prose or steps, no [n] markers. Only facts literally in
        the sources. If they don't support a reliable answer, say so here.
      sources: array of the integer ids (the source id="N" attribute) of
        sources actually used in answer.

    user_prompt_template: |
      {context}

      Question: {query}

    # Sampler options passed through to Ollama's /api/chat as "options".
    # temperature 0-0.3 + min_p (not top_p) is the recommended combo for
    # local models on extraction/classification-shaped tasks, which is
    # what answer_question is -- see libs/ollama.py's generate().
    options:
      temperature: 0.2
      min_p: 0.05

    # JSON Schema sent as Ollama's "format" field -- constrains sampling
    # to this shape (grammar-level, not a textual instruction). Mirrors
    # the reasoning/answer/sources fields the system_prompt above
    # describes. additionalProperties: false keeps the constrained
    # grammar smaller and rules out extra keys. All three keys required
    # (not just answer/sources) -- see the comment above this block for
    # why reasoning needs to be required, not just documented.
    response_schema:
      type: object
      properties:
        reasoning:
          type: string
        answer:
          type: string
        sources:
          type: array
          items:
            type: integer
      required: ["reasoning", "answer", "sources"]
      additionalProperties: false

  # Per-chunk template used to render each retrieved chunk into the context
  # block sent to the generation backend (answer_question only --
  # search_documents never generates). Python str.format() placeholders:
  # {id} (1-based position among the retrieved chunks), {title}, {path}
  # (source_path), {updated} (payload's lastmod, or "unknown" if it has
  # none), {text} (the chunk body). Values are substituted verbatim -- a
  # chunk's own text may contain literal "{"/"}" (e.g. heading anchors like
  # "{#launch-ue}") without breaking the template, since str.format() doesn't
  # re-scan substituted values for further placeholders. Only the template
  # string itself must stick to the five placeholders above.
  source_template: |
    <source id="{id}" title="{title}" path="{path}" updated="{updated}">
    {text}
    </source>

  # Request timeout (seconds) for calls to Ollama's /api/embeddings (query
  # embedding). Number > 0. Does not apply to generation.
  ollama_timeout: 120

  # Request timeout (seconds) for the "generate" step -- Ollama's /api/chat.
  # Number > 0. Separate from ollama_timeout above, which is embeddings-only.
  generate_timeout: 300
