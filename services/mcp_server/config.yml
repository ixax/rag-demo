# mcp-server runtime configuration
#
# Deployment/infra settings (Qdrant/Ollama URLs, ports, embedding model,
# Anthropic credentials) stay as environment variables in docker-compose.yml
# / .env -- this file is only for things you'd want to tune without touching
# infra. Since ./services/mcp_server is bind-mounted into the container,
# editing this file and restarting the service (`make restart`, or just the
# mcp-server service) is enough -- no rebuild needed.

# Everything behind search_documents/answer_question -- retrieval, reranking,
# and RAG-answer generation. Grouped under one key so it reads as a single
# unit distinct from anthropic_chat below, which is an unrelated,
# retrieval-free tool that just happens to live in this same file.
search_tools:
  # Reranking between Qdrant retrieval and generation, via the standalone
  # reranker HTTP service (see /remote-modelx/reranker) -- its
  # model/max_length live in remote-modelx/reranker/config.yml, not here.
  reranker:
    # true | false. When false, retrieval falls back to plain Qdrant
    # cosine-similarity order: the reranker service is never called, no
    # "rerank" step runs, and each result's rerank_score is null. Faster
    # (skips a network round-trip + CPU-heavy cross-encoder inference) but
    # less precise -- vector similarity alone can rank a semantically-
    # adjacent-but-wrong chunk above the actual answer (see AGENTS.md's
    # search-quality notes). Good for quick local iteration, or when the
    # reranker service isn't running.
    enabled: false
    # null | float in (0, 1]. Confidence-gated cutoff applied after reranking,
    # before top_k_rerank slicing: if the top-scoring chunk's rerank_score is
    # >= this value, every chunk scoring below it is dropped (a confidently
    # relevant match exists, so weaker ones are noise, not just "less good").
    # If the top score itself doesn't clear the cutoff, nothing is dropped --
    # a mediocre top match still beats returning no context at all. null
    # disables this (all top_k_rerank chunks are kept regardless of score).
    # Ignored when enabled is false (no rerank_score to gate on).
    confidence_cutoff: 0.9

  # How many chunks to pull and keep at each retrieval stage.
  retrieval:
    # Integer > 0. Candidates pulled from Qdrant by cosine similarity, before
    # reranking. Larger = better recall for the reranker to work with, but
    # slower (reranker inference time scales linearly with this). Irrelevant
    # when reranker.enabled is false -- top_k_rerank is applied directly to
    # the Qdrant-ordered hits instead, so there's no separate candidate pool.
    top_k_retrieve: 20
    # Integer > 0. How many reranked (or, with the reranker off, raw
    # vector-retrieved) chunks are kept as final context for generation, or
    # returned by search_documents. This is the default; callers can still
    # override it per-call via the tool's `top_k` argument.
    top_k_rerank: 5

  # Generation backend for answer_question. search_documents never generates
  # (retrieval-only), so this doesn't affect it.
  backend:
    # "" | "ollama" | "anthropic_token" | "anthropic_subscription".
    #   "" (empty):              skip generation entirely. answer_question
    #                            then behaves like search_documents -- returns
    #                            context/trace only, with answer/reasoning/
    #                            sources left null/empty and no "generate"
    #                            step in trace. Use this to test retrieval
    #                            without paying generation latency/cost.
    #   ollama:                  local MODEL_INSTRUCT_INTERNAL (env var) via
    #                            Ollama's /api/chat. max_tokens below is
    #                            ignored.
    #   anthropic_token:         the Claude Messages API via the official
    #                            `anthropic` SDK, using MODEL_INSTRUCT_EXTERNAL
    #                            (env var) and max_tokens below -- requires
    #                            ANTHROPIC_API_KEY to be set in the
    #                            environment (a credential, so it doesn't
    #                            live in this file). Billed per token.
    #   anthropic_subscription:  the same MODEL_INSTRUCT_EXTERNAL, but
    #                            generated by shelling out to the headless
    #                            `claude` CLI (Claude Code) instead of the
    #                            SDK -- requires CLAUDE_CODE_OAUTH_TOKEN (a
    #                            long-lived token from `claude setup-token`,
    #                            env var, credential) to be set instead of
    #                            ANTHROPIC_API_KEY. Billed against that
    #                            token's Claude subscription instead of per
    #                            token -- see src/libs/claude_cli.py's
    #                            docstring for why this needs a CLI
    #                            subprocess rather than just a different SDK
    #                            credential. Ignores max_tokens below (the
    #                            CLI doesn't expose that control).
    type: "ollama"
    # Placeholder -- overwritten at startup from MODEL_INSTRUCT_INTERNAL or
    # MODEL_INSTRUCT_EXTERNAL, whichever type above selects (see server.py).
    # Whatever is written here is ignored.
    model: "$MODEL_INSTRUCT_INTERNAL or $MODEL_INSTRUCT_EXTERNAL"
    # Max output tokens for the Claude API call. Required (no default) when
    # type is "anthropic_token"; ignored otherwise (including
    # anthropic_subscription -- see above). Integer > 0.
    max_tokens: 1024

  # Generation prompts/params, keyed by model family rather than one prompt
  # shared across every backend. Two keys:
  #   agentic: anthropic_token / anthropic_subscription (Claude/Codex-class
  #            models) -- long-form textual contract, since these models
  #            reliably follow it.
  #   local:   ollama (open-weight models run locally -- e.g. gemma3:4b,
  #            llama3.2:3b, qwen3). Short, literal instructions plus
  #            JSON-schema-constrained output (response_schema below, sent
  #            as Ollama's `format` field) instead of a textual "reply in
  #            this shape" instruction -- small local models don't reliably
  #            follow textual format instructions, but schema-constrained
  #            sampling enforces the shape regardless of the model's chat
  #            template (e.g. Gemma has no native system role; a template
  #            mismatch degrades quality silently rather than erroring, so
  #            the contract shouldn't depend on how the template handles
  #            system messages).
  generation_profiles:
    agentic:
      # Must keep the model replying in three labeled sections, in this
      # order, each starting on its own line -- "Reasoning:", "Answer:",
      # "Sources:" -- because answer_question's parse_structured_answer()
      # (libs/config.py) parses exactly that shape.
      system_prompt: |
        You are a documentation assistant. Answer using ONLY the sources below --
        never guess or use outside knowledge. Reply in the question's language.

        Combine sources that together answer different parts of the SAME
        question (e.g. an "install" step and a "launch" step). Don't pull in a
        source just because it shares a page or topic if it doesn't actually
        help answer what was asked.

        Reply in exactly three labeled sections, each starting on its own line
        with the label followed by a colon (not a markdown heading):

        Reasoning: 1-2 sentences on which sources are relevant and why.

        Answer: plain prose or steps, no [n] markers. Only facts literally in the
        sources. If they don't support a reliable answer, say so directly.

        Sources: one per line, '[id] title (path)', only those used in Answer.

      # {context}/{query} placeholders, same contract as local's below --
      # see user_prompt_template docs further down for the full placeholder
      # list (this key only differs in wording, not mechanics).
      user_prompt_template: |
        {context}

        Question: {query}

        Answer using only the sources above, in Reasoning/Answer/Sources format.
        Combine sources that cover different parts of this question, but don't
        pull in one that doesn't actually help. If the data isn't sufficient,
        say so in Answer -- don't invent one.

    local:
      # Short and literal on purpose -- see the generation_profiles comment
      # above. The three-key shape below is enforced by response_schema,
      # not by this text; this text only needs to carry semantic intent
      # (what each field means), not the JSON mechanics.
      # sources asks for bare ids, not a formatted citation string --
      # golden-eval showed gemma3:4b can pick correct ids reliably but can't
      # reliably compose "[id] title (path)" itself (produced malformed
      # output composing that string). server.py formats the citation from
      # `chunks` using the ids this returns, instead of asking the model to
      # produce that string. reasoning is required (was optional before --
      # golden-eval showed the model skips it entirely once it's optional,
      # even though the old free-text prompt without a schema always filled
      # it in reliably).
      system_prompt: |
        Answer using ONLY the sources. Never guess or use outside knowledge.
        Reply in the question's language.

        Output JSON with exactly these keys:
        reasoning: 1-2 sentences on which sources you used and why.
        answer: plain prose or steps, no [n] markers. Only facts literally in
          the sources. If they don't support a reliable answer, say so here.
        sources: array of the integer ids (the source id="N" attribute) of
          sources actually used in answer.

      user_prompt_template: |
        {context}

        Question: {query}

      # Sampler options passed through to Ollama's /api/chat as "options".
      # temperature 0-0.3 + min_p (not top_p) is the recommended combo for
      # local models on extraction/classification-shaped tasks, which is
      # what answer_question is -- see libs/ollama.py's generate().
      options:
        temperature: 0.2
        min_p: 0.05

      # JSON Schema sent as Ollama's "format" field -- constrains sampling
      # to this shape (grammar-level, not a textual instruction). Mirrors
      # the reasoning/answer/sources fields the system_prompt above
      # describes. additionalProperties: false keeps the constrained
      # grammar smaller and rules out extra keys. All three keys required
      # (not just answer/sources) -- see the comment above this block for
      # why reasoning needs to be required, not just documented.
      response_schema:
        type: object
        properties:
          reasoning:
            type: string
          answer:
            type: string
          sources:
            type: array
            items:
              type: integer
        required: ["reasoning", "answer", "sources"]
        additionalProperties: false

  # Per-chunk template used to render each retrieved chunk into the context
  # block sent to the generation backend (answer_question only --
  # search_documents never generates). Python str.format() placeholders:
  # {id} (1-based position among the retrieved chunks), {title}, {path}
  # (source_path), {updated} (payload's lastmod, or "unknown" if it has
  # none), {text} (the chunk body). Values are substituted verbatim -- a
  # chunk's own text may contain literal "{"/"}" (e.g. heading anchors like
  # "{#launch-ue}") without breaking the template, since str.format() doesn't
  # re-scan substituted values for further placeholders. Only the template
  # string itself must stick to the five placeholders above.
  source_template: |
    <source id="{id}" title="{title}" path="{path}" updated="{updated}">
    {text}
    </source>

  # Request timeout (seconds) for calls to Ollama's /api/embeddings (query
  # embedding). Number > 0. Does not apply to generation.
  ollama_timeout: 120

  # Request timeout (seconds) for the "generate" step -- Ollama's /api/chat
  # (backend.type: ollama) or the claude CLI subprocess (backend.type:
  # anthropic_subscription). Number > 0. Not used for anthropic_token (the
  # SDK has its own default timeout). Separate from ollama_timeout above,
  # which is embeddings-only.
  generate_timeout: 300

# Standalone `anthropic_chat` MCP tool -- raw text in, raw Claude reply out,
# no retrieval/RAG context at all (unrelated to search_documents/
# answer_question, hence living outside search_tools above). Independent of
# search_tools.backend: its own model, max_tokens, and auth mode, so it can
# point at a different Claude model and/or a different credential than
# whatever answer_question uses -- see libs/config.py's AnthropicChatConfig.
anthropic_chat:
  # true | false. When false, the anthropic_chat tool isn't registered at
  # all (doesn't appear in the MCP tool list) -- no client is built, no
  # credential is required.
  enabled: true
  # "token" | "subscription". Same two auth modes as search_tools.backend.type's
  # anthropic_* variants above, but chosen independently:
  #   token:         the Anthropic SDK, using ANTHROPIC_API_KEY. Billed per
  #                  token.
  #   subscription:  the headless `claude` CLI (Claude Code) subprocess,
  #                  using CLAUDE_CODE_OAUTH_TOKEN (a long-lived token from
  #                  `claude setup-token`) instead of ANTHROPIC_API_KEY.
  #                  Billed against that token's Claude subscription
  #                  instead of per token. Ignores max_tokens below (the
  #                  CLI doesn't expose that control) -- see timeout below
  #                  instead.
  auth: "subscription"
  # Placeholder -- overwritten at startup from the MODEL_CHAT env var (see
  # server.py). Whatever is written here is ignored. Required (no default,
  # via MODEL_CHAT) when enabled: true.
  model: "$MODEL_CHAT"
  # Max output tokens for the reply. Required (no default) when enabled:
  # true and auth: "token"; ignored for auth: "subscription" (see above).
  # Integer > 0.
  max_tokens: 4096
  # Optional system prompt for anthropic_chat calls -- unlike
  # search_tools.generation_profiles above, this is NOT the Reasoning/Answer/
  # Sources RAG contract (anthropic_chat has no context to reason over), so
  # leave it empty for a plain assistant, or set your own. Callers can
  # override this per-call via the tool's `system_prompt` argument.
  system_prompt: ""
  # Subprocess timeout (seconds) for auth: "subscription"'s claude CLI call.
  # Ignored for auth: "token" (the SDK has its own default timeout).
  # Number > 0.
  timeout: 120
