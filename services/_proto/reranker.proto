syntax = "proto3";

package reranker;

// Cross-encoder reranking as a standalone gRPC service. See
// reranker/config.yml for the model/max_length the service runs, and
// reranker/src/server.py for the implementation.
service Reranker {
  rpc Rerank (RerankRequest) returns (RerankResponse);
}

message RerankRequest {
  string query = 1;
  repeated string documents = 2;
}

message RerankResponse {
  // Scores aligned 1:1 with `documents` in the request, in the same order
  // (not sorted) -- the caller sorts/truncates as needed.
  repeated float scores = 1;
}
