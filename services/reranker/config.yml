# reranker service configuration -- inference tuning knobs.
#
# Host/port for the gRPC server itself, and the cross-encoder model id, are
# environment variables (RERANKER_HOST/RERANKER_PORT/MODEL_RERANKER, see
# docker-compose.yml/.env), not here. Since ./src is bind-mounted into the
# container, editing this file and restarting the service is enough -- no
# rebuild needed.

# Placeholder -- overwritten at startup from the MODEL_RERANKER env var
# (see server.py). Whatever is written here is ignored.
model: "$MODEL_RERANKER"

# Max input length (tokens) the cross-encoder truncates each query+document
# pair to. Integer > 0. Higher = handles longer documents but is slower and
# uses more memory. 512 comfortably covers this project's chunk sizes
# (services/ingest/config.yml's chunking.max_chars is 1800 characters, well under
# 512 tokens for most languages).
max_length: 512
